<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
    #scheduleBody td {
        text-align: right;
    }
    </style>

    <script>
        function calculateEMI() {
            
            var principal = parseFloat(prompt("Enter Principal Amount:"));
            var tenure = parseInt(prompt("Enter Tenure: "));
            var annualInterest = parseFloat(prompt("Enter Interest Rate: "));

           
            if (isNaN(principal) || isNaN(tenure) || isNaN(annualInterest)) {
                alert("Please enter valid numbers for all fields");
                return;
            }

            if (principal <= 0 || tenure <= 0 || annualInterest < 0) {
                alert("Please enter positive values for amount and tenure");
                return;
            }

            var monthlyInterest = annualInterest / 12 / 100;

            
            var emi;
            if (monthlyInterest === 0) {
                emi = principal / tenure;
            } else {
                emi = principal * monthlyInterest * Math.pow(1 + monthlyInterest, tenure) / (Math.pow(1 + monthlyInterest, tenure) - 1);
            }

          
            var tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = "";

            var balance = principal;

            for (var month = 1; month <= tenure; month++) {
               
                var interestPortion = balance * monthlyInterest;

               
                var principalPortion = emi - interestPortion;

                
                var remainingBalance = balance - principalPortion;

                
                if(month===tenure){
                    remainingBalance=0;
                }

               
                var row = document.createElement('tr');
                row.innerHTML = 
                    "<td class='text-end'>" + month + "</td>" +
                    "<td class='text-end'>" + balance.toFixed(2) + "</td>" +
                    "<td class='text-end'>" + emi.toFixed(2) + "</td>" +
                    "<td class='text-end'>" + principalPortion.toFixed(2) + "</td>" +
                    "<td class='text-end'>" + interestPortion.toFixed(2) + "</td>" +
                    "<td class='text-end'>" + remainingBalance.toFixed(2) + "</td>";

                tbody.appendChild(row);

                
                balance = remainingBalance;
            }
        }
    </script>
</head>
<body>
    <h1>EMI Calculator</h1>
    
    <button onclick="calculateEMI()">Calculate EMI</button>
    <div class="table-responsive text-end">
    <table  class="table table-striped table-hover table-primary text-end" >
        <thead class="text-end">
            <tr class="text-end">
                <th>SNO</th>
                <th>Loan Left</th>
                <th>EMI</th>
                <th>Principal</th>
                <th>Interest</th>
                <th>Remaining</th>
            </tr>
        </thead>
        <tbody id="scheduleBody" class="text-end">
        </tbody>
    </table>
    </div>
    
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>


</body>
</html>
